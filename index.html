<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>LuxuryLogico Mobile Preview</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050505;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif}
    body{min-height:100svh;display:grid;place-items:center;padding:max(28px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom))}
    main{width:min(520px,100%)}
    p{margin:0 0 28px;color:rgba(255,255,255,.48);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
    h1{margin:0 0 44px;font-size:clamp(32px,10vw,56px);font-weight:400;line-height:1.02;letter-spacing:-.045em}
    nav{display:grid;gap:12px}
    a{display:flex;align-items:center;justify-content:space-between;min-height:62px;padding:0 20px;border:1px solid rgba(255,255,255,.18);border-radius:999px;color:#fff;text-decoration:none;font-size:14px;transition:.25s ease}
    a:active{transform:scale(.98);background:rgba(255,255,255,.08)}
    span{color:rgba(255,255,255,.55)}
  </style>
</head>
<body>
  <main>
    <p>LuxuryLogico · Mobile Preview</p>
    <h1>Choose a layout</h1>
    <nav>
      <a href="central.html">中央版 <span>Central →</span></a>
      <a href="left.html">左側版 <span>Left →</span></a>
    </nav>
  </main>
</body>
</html>
