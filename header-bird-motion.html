<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LuxuryLogico — Header Bird Motion</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif}
body{overflow:hidden}
.site-header{position:relative;width:100%;height:96px;display:flex;align-items:center;justify-content:space-between;padding:0 42px;background:#000}
.brand{display:flex;align-items:center;width:150px}.brand img{display:block;width:118px;height:auto}
.header-nav{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:38px;font-size:14px;font-weight:300;letter-spacing:.01em}
.header-nav a{color:#fff;text-decoration:none;opacity:.92}
.bird-slot{position:relative;width:54px;height:54px;display:grid;place-items:center;cursor:pointer}
.bird-flight{width:47px;height:47px;display:grid;place-items:center;transform-origin:50% 50%;transform-style:preserve-3d;will-change:transform,opacity,filter}
.bird-rig{position:relative;width:47px;height:47px;transform-style:preserve-3d;filter:drop-shadow(0 0 8px rgba(255,255,255,.08))}
.bird-image{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;will-change:opacity,transform}
.bird-depth{z-index:0;opacity:.18;filter:blur(.9px) brightness(.45);transform:translate3d(0,2px,-7px)}
.bird-motion{z-index:2;opacity:1;background-image:url('weather-bird-sprite.png');background-size:1000% 2000%;background-repeat:no-repeat;background-position:0 0}.bird-still{z-index:3;opacity:0}
.language{width:150px;text-align:right;font-size:12px;font-weight:300;letter-spacing:.04em;opacity:.85}
.stage{height:calc(100svh - 96px);background:#000}
@media(max-width:700px){
 .site-header{height:76px;padding:0 20px}
 .brand{width:100px}.brand img{width:92px}
 .header-nav{gap:0}.header-nav a{display:none}
 .bird-slot{width:36px;height:36px}.bird-flight,.bird-rig{width:31px;height:31px}
 .language{width:100px;font-size:0}.language:after{content:"";display:inline-block;width:18px;height:14px;background:linear-gradient(#fff,#fff) top/18px 1px no-repeat,linear-gradient(#fff,#fff) bottom/18px 1px no-repeat}
 .stage{height:calc(100svh - 76px)}
}
@media(prefers-reduced-motion:reduce){.bird-flight,.bird-image{transform:none!important}.bird-motion{opacity:0!important}.bird-still{opacity:1!important}}
</style>
</head>
<body>
<header class="site-header">
  <a class="brand" href="#" aria-label="LuxuryLogico 首頁"><img src="embedded-7d630d246b0b.png" alt="豪華朗機工 LuxuryLogico"></a>
  <nav class="header-nav" aria-label="主要選單">
    <a href="#">Works</a>
    <button class="bird-slot" id="birdSlot" type="button" aria-label="重播天氣鳥進場動畫" style="border:0;background:transparent;padding:0">
      <span class="bird-flight" id="birdFlight">
        <span class="bird-rig" id="birdRig" role="img" aria-label="天氣鳥">
          <img class="bird-image bird-depth" id="birdDepth" src="weather-bird-still.png" alt="">
          <span class="bird-image bird-motion" id="birdMotion"></span>
          <img class="bird-image bird-still" id="birdStill" src="weather-bird-final.png" alt="">
        </span>
      </span>
    </button>
    <a href="#">About</a>
  </nav>
  <div class="language">CN / EN</div>
</header>
<main class="stage"></main>
<script>
const birdFlight=document.getElementById('birdFlight');
const birdRig=document.getElementById('birdRig');
const birdDepth=document.getElementById('birdDepth');
const birdMotion=document.getElementById('birdMotion');
const birdStill=document.getElementById('birdStill');
const slot=document.getElementById('birdSlot');
let flightFrame=0;
const spriteColumns=10;
const spriteRows=20;
const spriteFrames=195;

function setBirdFrame(frame){
  const index=((frame%spriteFrames)+spriteFrames)%spriteFrames;
  const column=index%spriteColumns;
  const row=Math.floor(index/spriteColumns);
  birdMotion.style.backgroundPosition=`${column/(spriteColumns-1)*100}% ${row/(spriteRows-1)*100}%`;
}

function bezier(p0,p1,p2,p3,t){
  const u=1-t;
  return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;
}

function bezierTangent(p0,p1,p2,p3,t){
  const u=1-t;
  return 3*u*u*(p1-p0)+6*u*t*(p2-p1)+3*t*t*(p3-p2);
}

function smootherstep(t){
  return t*t*t*(t*(t*6-15)+10);
}

function easeOutCubic(t){
  return 1-Math.pow(1-t,3);
}

function phase(from,to,value){
  const n=Math.max(0,Math.min(1,(value-from)/(to-from)));
  return smootherstep(n);
}

function flyToPosition(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  cancelAnimationFrame(flightFrame);
  const startX=-Math.min(innerWidth*.30,360);
  const startY=Math.min(innerHeight*.18,140);
  const curveX=Math.min(innerWidth*.18,210);
  const duration=5400;
  const p0={x:startX,y:startY};
  const p1={x:-curveX*.58,y:startY*.78};
  const p2={x:-curveX*.14,y:-12};
  const p3={x:0,y:0};
  const began=performance.now();
  let previousTime=began;
  let frameCursor=0;

  birdMotion.style.opacity='1';
  birdStill.style.opacity='0';

  function render(now){
    const raw=Math.min(1,(now-began)/duration);
    const elapsed=Math.min(64,Math.max(0,now-previousTime));
    previousTime=now;
    /* 前段有推進力，後段把最後 12% 留給安靜、精準的落位。 */
    const t=raw<.72
      ? .88*easeOutCubic(raw/.72)
      : .88+.12*smootherstep((raw-.72)/.28);
    const x=bezier(p0.x,p1.x,p2.x,p3.x,t);
    const y=bezier(p0.y,p1.y,p2.y,p3.y,t);
    const dx=bezierTangent(p0.x,p1.x,p2.x,p3.x,t);
    const dy=bezierTangent(p0.y,p1.y,p2.y,p3.y,t);

    const align=phase(.54,.94,raw);
    const pathHeading=Math.atan2(dy,dx)*180/Math.PI+90;
    const heading=pathHeading*(1-align);
    /* 姿態只保留一次側傾與一次收勢，避免反覆搖晃造成卡通感。 */
    const pitch=5.5*(1-t)-2.4*Math.sin(Math.PI*phase(.58,.92,raw));
    const roll=-7.5*Math.sin(Math.PI*phase(.04,.66,raw))*(1-align);
    const yawDrift=1.15*Math.sin(Math.PI*phase(.12,.58,raw))*(1-align);
    /* 尺寸先明顯收近，再用很長的尾韻精準縮進 Header 定位。 */
    const scaleProgress=raw<.68
      ? .90*easeOutCubic(raw/.68)
      : .90+.10*smootherstep((raw-.68)/.32);
    const scale=2.32+(1-2.32)*scaleProgress;
    const depth=82*(1-scaleProgress)+6*Math.sin(Math.PI*raw)*(1-align);
    const blur=.38*Math.pow(1-scaleProgress,1.8);
    const opacity=Math.min(1,raw/.075);
    /* 拍翅節奏：近景兩次有力下拍 → 長滑翔 → 落位前收翼減速。 */
    const launch=Math.sin(Math.PI*Math.min(1,raw/.24));
    const brake=Math.sin(Math.PI*Math.max(0,Math.min(1,(raw-.56)/.31)));
    const wingEnergy=Math.max(.10,launch,brake*.92);
    const finalSettle=phase(.88,1,raw);

    let wingSpeed;
    if(raw<.24) wingSpeed=1.52;
    else if(raw<.56) wingSpeed=.22;
    else if(raw<.82) wingSpeed=1.32;
    else if(raw<.92) wingSpeed=.38;
    else wingSpeed=.10;
    frameCursor=(frameCursor+elapsed/30*wingSpeed)%spriteFrames;
    setBirdFrame(Math.floor(frameCursor));

    const wingLift=Math.max(0,Math.sin(frameCursor*.34))*wingEnergy;

    birdFlight.style.transform=`perspective(1300px) translate3d(${x}px,${y}px,${depth}px) rotateZ(${heading+yawDrift}deg) rotateX(${pitch}deg) rotateY(${roll}deg) scale(${scale})`;
    birdFlight.style.filter=`blur(${blur}px)`;
    birdFlight.style.opacity=String(opacity);
    birdMotion.style.opacity=String(1-finalSettle);
    birdStill.style.opacity=String(finalSettle);
    birdRig.style.transform=`translate3d(0,${-1.15*wingLift}px,${2.2*wingLift}px) rotateX(${-2.2*brake}deg) scale(${1+.012*wingLift})`;
    birdDepth.style.opacity=String(.20*(1-finalSettle)*(0.55+0.45*t));

    if(raw<1){
      flightFrame=requestAnimationFrame(render);
    }else{
      birdFlight.style.transform='perspective(1300px) translate3d(0,0,0) rotateZ(0deg) rotateX(0deg) rotateY(0deg) scale(1)';
      birdFlight.style.filter='blur(0)';
      birdMotion.style.opacity='0';
      birdStill.style.opacity='1';
      birdRig.style.transform='translate3d(0,0,0) scale(1)';
      birdDepth.style.opacity='0';
    }
  }
  flightFrame=requestAnimationFrame(render);
}

addEventListener('load',()=>setTimeout(flyToPosition,280),{once:true});
slot.addEventListener('click',flyToPosition);
</script>
</body>
</html>
