<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LuxuryLogico — Header Bird Motion</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif}
body{overflow:hidden}
.site-header{position:relative;width:100%;height:96px;display:flex;align-items:center;justify-content:space-between;padding:0 42px;background:#000}
.brand{display:flex;align-items:center;width:150px}.brand img{display:block;width:118px;height:auto}
.header-nav{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:38px;font-size:14px;font-weight:300;letter-spacing:.01em}
.header-nav a{color:#fff;text-decoration:none;opacity:.92}
.bird-slot{position:relative;width:54px;height:54px;display:grid;place-items:center;cursor:pointer}
.bird-flight{width:47px;height:47px;display:grid;place-items:center;transform-origin:50% 50%;transform-style:preserve-3d;will-change:transform,opacity,filter}
.bird-rig{position:relative;width:47px;height:47px;filter:drop-shadow(0 0 8px rgba(255,255,255,.08))}
.bird-image{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;will-change:opacity,transform}
.bird-motion{opacity:1}.bird-still{opacity:0}
.language{width:150px;text-align:right;font-size:12px;font-weight:300;letter-spacing:.04em;opacity:.85}
.stage{height:calc(100svh - 96px);background:#000}
@media(max-width:700px){
 .site-header{height:76px;padding:0 20px}
 .brand{width:100px}.brand img{width:92px}
 .header-nav{gap:0}.header-nav a{display:none}
 .bird-slot{width:36px;height:36px}.bird-flight,.bird-rig{width:31px;height:31px}
 .language{width:100px;font-size:0}.language:after{content:"";display:inline-block;width:18px;height:14px;background:linear-gradient(#fff,#fff) top/18px 1px no-repeat,linear-gradient(#fff,#fff) bottom/18px 1px no-repeat}
 .stage{height:calc(100svh - 76px)}
}
@media(prefers-reduced-motion:reduce){.bird-flight,.bird-image{transform:none!important}.bird-motion{opacity:0!important}.bird-still{opacity:1!important}}
</style>
</head>
<body>
<header class="site-header">
  <a class="brand" href="#" aria-label="LuxuryLogico 首頁"><img src="embedded-7d630d246b0b.png" alt="豪華朗機工 LuxuryLogico"></a>
  <nav class="header-nav" aria-label="主要選單">
    <a href="#">Works</a>
    <button class="bird-slot" id="birdSlot" type="button" aria-label="重播天氣鳥進場動畫" style="border:0;background:transparent;padding:0">
      <span class="bird-flight" id="birdFlight">
        <span class="bird-rig" id="birdRig" role="img" aria-label="天氣鳥">
          <img class="bird-image bird-motion" id="birdMotion" src="weather-bird-motion.gif" alt="">
          <img class="bird-image bird-still" id="birdStill" src="weather-bird-still.png" alt="">
        </span>
      </span>
    </button>
    <a href="#">About</a>
  </nav>
  <div class="language">CN / EN</div>
</header>
<main class="stage"></main>
<script>
const birdFlight=document.getElementById('birdFlight');
const birdRig=document.getElementById('birdRig');
const birdMotion=document.getElementById('birdMotion');
const birdStill=document.getElementById('birdStill');
const slot=document.getElementById('birdSlot');
let flight;
let motionFade;
let stillReveal;

function flyToPosition(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if(flight) flight.cancel();
  if(motionFade) motionFade.cancel();
  if(stillReveal) stillReveal.cancel();
  const startX=Math.min(innerWidth*.28,340);
  const startY=Math.min(innerHeight*.56,470);
  const duration=7600;

  /* 片頭式空間運動：從黑暗遠景接近，只保留兩次克制的側傾。 */
  flight=birdFlight.animate([
    {transform:`perspective(1200px) translate3d(${startX}px,${startY}px,-420px) rotateZ(-10deg) rotateY(-8deg) scale(.28)`,opacity:0,filter:'blur(3.2px)',offset:0},
    {transform:`perspective(1200px) translate3d(${startX*.86}px,${startY*.81}px,-330px) rotateZ(-8deg) rotateY(-6deg) scale(.37)`,opacity:.24,filter:'blur(2.4px)',offset:.14},
    {transform:`perspective(1200px) translate3d(${startX*.66}px,${startY*.60}px,-230px) rotateZ(-5deg) rotateY(-2deg) scale(.51)`,opacity:.58,filter:'blur(1.5px)',offset:.31},
    {transform:`perspective(1200px) translate3d(${startX*.46}px,${startY*.40}px,-140px) rotateZ(-2deg) rotateY(4deg) scale(.66)`,opacity:.82,filter:'blur(.75px)',offset:.48},
    {transform:`perspective(1200px) translate3d(${startX*.28}px,${startY*.23}px,-72px) rotateZ(.8deg) rotateY(6deg) scale(.79)`,opacity:.96,filter:'blur(.25px)',offset:.64},
    {transform:`perspective(1200px) translate3d(${startX*.13}px,${startY*.095}px,-25px) rotateZ(-.7deg) rotateY(2deg) scale(.90)`,opacity:1,filter:'blur(0)',offset:.79},
    {transform:`perspective(1200px) translate3d(${startX*.035}px,${startY*.022}px,-5px) rotateZ(-.2deg) rotateY(.5deg) scale(.975)`,opacity:1,filter:'blur(0)',offset:.92},
    {transform:'perspective(1200px) translate3d(0,0,0) rotateZ(0) rotateY(0) scale(1)',opacity:1,filter:'blur(0)',offset:1}
  ],{duration,easing:'cubic-bezier(.2,.52,.16,1)',fill:'both'});

  /* 抵達時，動態鳥無縫溶接為完全靜止的品牌標誌。 */
  motionFade=birdMotion.animate([
    {opacity:1,offset:0},{opacity:1,offset:.86},{opacity:0,offset:1}
  ],{duration,easing:'cubic-bezier(.45,0,.2,1)',fill:'both'});
  stillReveal=birdStill.animate([
    {opacity:0,transform:'scale(.985)',offset:0},
    {opacity:0,transform:'scale(.985)',offset:.84},
    {opacity:1,transform:'scale(1)',offset:1}
  ],{duration,easing:'cubic-bezier(.45,0,.2,1)',fill:'both'});
}

addEventListener('load',()=>setTimeout(flyToPosition,280),{once:true});
slot.addEventListener('click',flyToPosition);
</script>
</body>
</html>
