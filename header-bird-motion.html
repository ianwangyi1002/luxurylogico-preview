<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LuxuryLogico — Header Bird Motion</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif}
body{overflow:hidden}
.site-header{position:relative;width:100%;height:96px;display:flex;align-items:center;justify-content:space-between;padding:0 42px;background:#000}
.brand{display:flex;align-items:center;width:150px}.brand img{display:block;width:118px;height:auto}
.header-nav{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:38px;font-size:14px;font-weight:300;letter-spacing:.01em}
.header-nav a{color:#fff;text-decoration:none;opacity:.92}
.bird-slot{position:relative;width:54px;height:54px;display:grid;place-items:center;cursor:pointer}
.bird-flight{width:47px;height:33px;display:grid;place-items:center;transform-origin:50% 55%;will-change:transform,opacity}
.bird{display:block;width:47px;height:33px;object-fit:contain;transform-origin:50% 55%;will-change:transform;filter:drop-shadow(0 0 0 transparent)}
.bird.arrived{filter:drop-shadow(0 0 8px rgba(255,255,255,.12))}
.language{width:150px;text-align:right;font-size:12px;font-weight:300;letter-spacing:.04em;opacity:.85}
.stage{height:calc(100svh - 96px);background:#000}
@media(max-width:700px){
 .site-header{height:76px;padding:0 20px}
 .brand{width:100px}.brand img{width:92px}
 .header-nav{gap:0}.header-nav a{display:none}
 .bird-slot{width:36px;height:36px}.bird-flight,.bird{width:31px;height:22px}
 .language{width:100px;font-size:0}.language:after{content:"";display:inline-block;width:18px;height:14px;background:linear-gradient(#fff,#fff) top/18px 1px no-repeat,linear-gradient(#fff,#fff) bottom/18px 1px no-repeat}
 .stage{height:calc(100svh - 76px)}
}
@media(prefers-reduced-motion:reduce){.bird-flight,.bird{transform:none!important;opacity:1!important}}
</style>
</head>
<body>
<header class="site-header">
  <a class="brand" href="#" aria-label="LuxuryLogico 首頁"><img src="embedded-7d630d246b0b.png" alt="豪華朗機工 LuxuryLogico"></a>
  <nav class="header-nav" aria-label="主要選單">
    <a href="#">Works</a>
    <button class="bird-slot" id="birdSlot" type="button" aria-label="重播天氣鳥進場動畫" style="border:0;background:transparent;padding:0">
      <span class="bird-flight" id="birdFlight"><img class="bird" id="weatherBird" src="weather-bird-motion.gif" alt="天氣鳥"></span>
    </button>
    <a href="#">About</a>
  </nav>
  <div class="language">CN / EN</div>
</header>
<main class="stage"></main>
<script>
const bird=document.getElementById('weatherBird');
const birdFlight=document.getElementById('birdFlight');
const slot=document.getElementById('birdSlot');
let flight;
let wingRhythm;

function flyToPosition(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if(flight) flight.cancel();
  if(wingRhythm) wingRhythm.cancel();
  bird.classList.remove('arrived');
  const startX=Math.min(innerWidth*.25,300);
  const startY=Math.min(innerHeight*.52,440);

  /* 起飛加速、側身滑翔、展翼煞停。速度與側傾依飛行階段變化。 */
  flight=birdFlight.animate([
    {transform:`perspective(700px) translate3d(${startX}px,${startY}px,-120px) rotateZ(-24deg) rotateY(-28deg) scale(.50)`,filter:'blur(1.8px)',opacity:0,offset:0},
    {transform:`perspective(700px) translate3d(${startX*.82}px,${startY*.79}px,-95px) rotateZ(-22deg) rotateY(-24deg) scale(.58)`,filter:'blur(1.2px)',opacity:.58,offset:.10},
    {transform:`perspective(700px) translate3d(${startX*.56}px,${startY*.53}px,-62px) rotateZ(-17deg) rotateY(-16deg) scale(.69)`,filter:'blur(.65px)',opacity:.9,offset:.24},
    {transform:`perspective(700px) translate3d(${startX*.33}px,${startY*.31}px,-32px) rotateZ(-11deg) rotateY(-8deg) scale(.80)`,filter:'blur(.25px)',opacity:1,offset:.41},
    {transform:`perspective(700px) translate3d(${startX*.17}px,${startY*.15}px,-12px) rotateZ(-6deg) rotateY(5deg) scale(.89)`,filter:'blur(0)',opacity:1,offset:.60},
    {transform:`perspective(700px) translate3d(${startX*.07}px,${startY*.055}px,0) rotateZ(-2.5deg) rotateY(9deg) scale(.95)`,filter:'blur(0)',opacity:1,offset:.76},
    {transform:'perspective(700px) translate3d(8px,6px,0) rotateZ(-1deg) rotateY(4deg) scale(.985)',filter:'blur(0)',opacity:1,offset:.89},
    {transform:'perspective(700px) translate3d(2px,1px,0) rotateZ(-.25deg) rotateY(1deg) scale(.997)',filter:'blur(0)',opacity:1,offset:.965},
    {transform:'perspective(700px) translate3d(0,0,0) rotateZ(0) rotateY(0) scale(1)',filter:'blur(0)',opacity:1,offset:1}
  ],{
    duration:4400,
    easing:'cubic-bezier(.16,.58,.18,1)',
    fill:'both'
  });

  /* 只用細微尺度模擬拍翅推進與最後展翼，不扭曲鳥的輪廓。 */
  wingRhythm=bird.animate([
    {transform:'scaleX(.96) scaleY(.96)',offset:0},
    {transform:'scaleX(1.035) scaleY(1.015)',offset:.07},
    {transform:'scaleX(.97) scaleY(.975)',offset:.14},
    {transform:'scaleX(1.03) scaleY(1.012)',offset:.22},
    {transform:'scaleX(.98) scaleY(.985)',offset:.31},
    {transform:'scaleX(1.015) scaleY(1)',offset:.43},
    {transform:'scaleX(.99) scaleY(.995)',offset:.56},
    {transform:'scaleX(1.01) scaleY(1)',offset:.69},
    {transform:'scaleX(1.07) scaleY(.985)',offset:.83},
    {transform:'scaleX(1.035) scaleY(.995)',offset:.91},
    {transform:'scaleX(1) scaleY(1)',offset:1}
  ],{duration:4400,easing:'ease-in-out',fill:'both'});
  flight.onfinish=()=>bird.classList.add('arrived');
}

addEventListener('load',()=>setTimeout(flyToPosition,280),{once:true});
slot.addEventListener('click',flyToPosition);
</script>
</body>
</html>
