  <style>
    :root{--bg:#050505;--fg:#f2f2f2;--muted:rgba(255,255,255,.46);--line:rgba(255,255,255,.16);--ease:cubic-bezier(.22,.61,.36,1)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Noto Sans TC",sans-serif;font-weight:300}button,a{font:inherit;color:inherit}button{cursor:pointer}a{text-decoration:none}.header{position:fixed;z-index:20;inset:0 0 auto;height:88px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:38px 56px 0 60px;background:linear-gradient(#050505 40%,rgba(5,5,5,.78) 72%,transparent)}.brand{width:98px}.brand img{display:block;width:100%}.nav{display:flex;align-items:center;gap:38px;font-size:12px}.nav img{width:47px;height:33px;object-fit:contain}.lang{justify-self:end;font-size:10px;color:var(--muted)}.menu{display:none}
    main{padding:170px clamp(30px,7vw,120px) 110px}.hero{display:flex;justify-content:space-between;align-items:end;padding-bottom:36px;border-bottom:1px solid var(--line)}.eyebrow{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}.hero h1{margin:16px 0 0;font-size:clamp(54px,8vw,126px);line-height:.9;font-weight:280;letter-spacing:-.06em}.hero p{width:min(420px,35vw);font-size:12px;line-height:1.9;color:var(--muted);margin:0 0 6px}.tabs{display:flex;gap:7px;margin:42px 0 70px}.tab{border:1px solid var(--line);border-radius:999px;background:transparent;padding:8px 16px;font-size:10px;color:var(--muted);transition:.25s}.tab:hover,.tab.active{color:#fff;border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.05)}.section{display:none}.section.active{display:block;animation:in .45s var(--ease)}@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.section-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:22px}.section-head h2{font-size:clamp(28px,3vw,44px);font-weight:300;margin:0}.section-head span{font-size:9px;color:var(--muted);letter-spacing:.12em}.list{border-top:1px solid var(--line)}.row{width:100%;display:grid;grid-template-columns:100px 1fr auto;gap:28px;align-items:center;text-align:left;border:0;border-bottom:1px solid var(--line);background:transparent;padding:25px 4px;transition:.25s}.row:hover{padding-left:14px;background:rgba(255,255,255,.035)}.date{font-size:10px;color:var(--muted)}.row h3{font-size:17px;font-weight:350;margin:0 0 7px}.row p{font-size:10px;color:var(--muted);margin:0}.arrow{font-size:18px;color:var(--muted)}.pagination{display:flex;justify-content:flex-end;gap:7px;padding-top:28px}.page-btn{width:31px;height:31px;border:1px solid var(--line);border-radius:50%;background:transparent;color:var(--muted);font-size:9px}.page-btn:hover,.page-btn.active{border-color:rgba(255,255,255,.55);color:#fff;background:rgba(255,255,255,.05)}.detail{display:none;grid-template-rows:auto 1fr;min-height:650px;border-top:1px solid var(--line);animation:in .45s var(--ease)}.detail.open{display:grid}.detail-bar{height:58px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.detail-kind{font-size:11px;letter-spacing:.18em;color:var(--muted)}.close{border:0;background:none;font-size:12px;color:var(--muted);padding:10px 0}.detail-body{display:grid;grid-template-columns:.8fr 1.2fr;gap:clamp(45px,7vw,120px);padding:48px 0 0}.detail-media{background:#111;min-height:480px}.detail-media img{width:100%;height:100%;object-fit:cover;filter:brightness(.76)}.detail-copy{display:flex;flex-direction:column;padding:6px 0 0}.detail-copy h2{font-size:clamp(34px,4vw,64px);font-weight:280;letter-spacing:-.045em;margin:22px 0 34px}.detail-copy p{font-size:13px;line-height:2;color:rgba(255,255,255,.66);max-width:650px}.external{margin-top:auto;align-self:flex-end;padding:24px 0 10px;font-size:13px;color:#fff;border-bottom:1px solid rgba(255,255,255,.45)}
    @media(max-width:720px){.header{height:76px;padding:52px 16px 0 19px;background:#050505}.brand{width:67px}.nav a{display:none}.nav img{width:24px;height:17px}.lang{display:none}.menu{display:flex;justify-self:end;width:14px;height:7px;flex-direction:column;justify-content:space-between}.menu i{height:1px;background:#fff;width:100%}main{padding:122px 20px 76px}.hero{display:block}.hero h1{font-size:58px}.hero p{width:auto;margin-top:34px}.tabs{overflow:auto;white-space:nowrap;margin:30px 0 50px}.row{grid-template-columns:62px 1fr auto;gap:13px;padding:21px 2px}.pagination{padding-top:22px}.detail{min-height:0}.detail-body{grid-template-columns:1fr;padding-top:24px;gap:28px}.detail-media{min-height:0;height:44vh}.detail-copy{min-height:310px}.detail-copy h2{font-size:36px}.external{margin-top:46px}}
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>

</head>
<body>
  <header class="header"><a class="brand" href="index.html"><img src="embedded-7d630d246b0b.png" alt="豪華朗機工 LuxuryLogico"></a><nav class="nav"><a href="left.html">Works</a><img src="embedded-cacb32ca5c6c.png" alt="天氣鳥"><a href="organization.html">About</a></nav><div class="lang">中 / EN</div><button class="menu" aria-label="選單"><i></i><i></i></button></header>
  <main><section class="hero"><div><div class="eyebrow">Explore / 01</div><h1>消息與<br>資料</h1></div><p>收錄豪華朗機工的展覽消息、新聞動態、出版品與研究資料，持續補充團隊在不同場域中的創作軌跡。</p></section>
    <nav class="tabs" aria-label="探索分類"><button class="tab active" data-tab="news">消息</button><button class="tab" data-tab="publication">出版</button><button class="tab" data-tab="archive">資料</button></nav>
    <section class="section active" id="news"><div class="section-head"><h2>展訊與新聞</h2><span>NEWS / 30</span></div><div class="list"></div><div class="pagination"></div></section>
    <section class="section" id="publication"><div class="section-head"><h2>出版與專文</h2><span>PUBLICATION / 30</span></div><div class="list"></div><div class="pagination"></div></section>
    <section class="section" id="archive"><div class="section-head"><h2>資料與紀錄</h2><span>ARCHIVE / 30</span></div><div class="list"></div><div class="pagination"></div></section>
    <section class="detail" id="detail"><div class="detail-bar"><span class="detail-kind">DETAIL</span><button class="close" id="close">返回列表 ×</button></div><div class="detail-body"><div class="detail-media"><img id="detailImage" src="embedded-40e23b1a781f.jpg" alt="展訊示意"></div><div class="detail-copy"><div class="eyebrow" id="detailMeta">Exhibition / 2026</div><h2 id="detailTitle">日光域 XI</h2><p id="detailText">以光、機械與觀者的移動構成持續變化的感知場域。收錄作品概念、展演資訊與相關紀錄，作為內容閱讀與外部資料之間的銜接。</p><a class="external" id="detailLink" href="https://luxurylogico.com/zh/" target="_blank" rel="noopener">深入了解 ↗</a></div></div></section>
  </main>
  <script>
    const seed={news:[['日光域 XI｜台北當代藝術館','展覽'],['宇宙寫生｜團隊創作計畫','展覽'],['演算法和諧｜SOMA Berlin','展覽'],['豪華朗機工獲選年度藝術團隊','新聞'],['永動之境｜公共藝術計畫','新聞'],['年度計畫公開','消息'],['光之構成｜現地創作','展覽'],['機械風景｜藝術節計畫','展覽'],['共振現場｜演出紀錄','消息'],['城市感知｜公共藝術發表','新聞']],publication:[['天氣好不好我們都要飛｜作品專書','專書'],['台灣光譜｜策展手冊','出版'],['機械、身體與觀看｜藝術家對談','專文'],['光與機械的共同語言','專文'],['場域感知｜創作研究集','研究'],['豪華朗機工十年創作誌','專書'],['藝術與科技的交會現場','專文'],['公共藝術實踐手冊','出版'],['移動中的觀看｜對談錄','專文'],['天氣鳥計畫｜影像專刊','專書']],archive:[['豪華朗機工作品年表','檔案'],['天氣鳥計畫歷年紀錄','影像'],['公共藝術與場域實踐','研究'],['媒體報導與採訪資料','新聞資料'],['海外展演紀錄','檔案'],['工作室創作手稿','研究'],['歷年演出影像選輯','影像'],['展覽平面與出版紀錄','檔案'],['團隊講座與論壇紀錄','研究'],['作品技術文件彙整','資料']]};
    const images=['embedded-40e23b1a781f.jpg','embedded-31c19999a4d3.png','embedded-e993987c439f.png','embedded-ccab87a27545.jpg'];
    const data={};Object.entries(seed).forEach(([key,items])=>{data[key]=Array.from({length:30},(_,i)=>{const base=items[i%10];const year=2026-Math.floor(i/10);const month=String(12-(i%10)).padStart(2,'0');return [`${year}.${month}.${String((i%27)+1).padStart(2,'0')}`,base[0]+(i>9?` ${Math.floor(i/10)+1}`:''),base[1],images[i%images.length]]})});
    const state={news:1,publication:1,archive:1};let activeKey='news';
    function renderSection(key){const page=state[key],items=data[key].slice((page-1)*10,page*10),section=document.getElementById(key);section.querySelector('.list').innerHTML=items.map(x=>`<button class="row" data-title="${x[1]}" data-date="${x[0]}" data-type="${x[2]}" data-image="${x[3]}"><span class="date">${x[0]}</span><span><h3>${x[1]}</h3><p>${x[2]}</p></span><span class="arrow">↗</span></button>`).join('');section.querySelector('.pagination').innerHTML=[1,2,3].map(n=>`<button class="page-btn ${n===page?'active':''}" data-page="${n}">${String(n).padStart(2,'0')}</button>`).join('')}
    Object.keys(data).forEach(renderSection);
    function showList(key){activeKey=key;detail.classList.remove('open');document.querySelectorAll('.section').forEach(n=>n.classList.toggle('active',n.id===key))}
    document.querySelector('.tabs').onclick=e=>{if(!e.target.matches('.tab'))return;document.querySelectorAll('.tab').forEach(n=>n.classList.remove('active'));e.target.classList.add('active');showList(e.target.dataset.tab)};
    document.addEventListener('click',e=>{const page=e.target.closest('.page-btn');if(page){state[activeKey]=Number(page.dataset.page);renderSection(activeKey);return}const row=e.target.closest('.row');if(!row)return;document.querySelectorAll('.section').forEach(n=>n.classList.remove('active'));detailTitle.textContent=row.dataset.title;detailMeta.textContent=row.dataset.date+' / '+row.dataset.type;detailImage.src=row.dataset.image;detail.classList.add('open');detail.scrollIntoView({behavior:'smooth',block:'start'})});
    document.getElementById('close').onclick=()=>showList(activeKey);
    if(new URLSearchParams(location.search).get('demo')==='detail'){document.querySelector('#news .row').click()}
  </script>
</body></html>
