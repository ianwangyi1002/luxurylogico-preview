<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;color:#f4f4f4;font-family:Arial,"Noto Sans TC",sans-serif}
body{position:relative}
header{position:fixed;inset:0 0 auto;height:90px;display:flex;align-items:center;justify-content:space-between;padding:0 3.5vw;z-index:50;background:linear-gradient(#000e,#0000)}
.brand{display:flex;align-items:center}.brand img{width:118px;height:auto;display:block}
nav{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:46px;align-items:center;font-size:13px}
.nav-bird{width:54px;height:54px;object-fit:contain;cursor:pointer}
.language{font-size:11px}
main{width:100%;height:100vh;position:relative;display:flex;align-items:center}
.project-info{position:absolute;left:50%;top:17vh;transform:translateX(-50%);width:min(70vw,900px);z-index:10;text-align:center;font-family:Arial,"Noto Sans TC",sans-serif;pointer-events:none}
.project-number{display:block;font-size:12px;font-weight:500;letter-spacing:.08em;line-height:1;margin:0 0 12px;opacity:.72;transition:opacity .18s ease,transform .18s ease}.project-info h1{font-size:16px;font-weight:500;letter-spacing:.08em;line-height:1.4;margin:0;transition:opacity .18s ease,transform .18s ease}.project-info.changing h1,.project-info.changing .project-number{opacity:0;transform:translateY(5px)}
.gallery-viewport{position:absolute;left:0;right:0;top:23vh;height:62vh;overflow:hidden;cursor:grab;touch-action:none;perspective:1250px;perspective-origin:50% 50%}

.card{width:255px;height:455px;flex:none;overflow:hidden;opacity:.42;background:#111;margin-left:-58px;transform-style:preserve-3d;transform-origin:center center;backface-visibility:hidden;box-shadow:0 18px 40px rgba(0,0,0,.5);transition:opacity .28s ease,filter .28s ease;will-change:transform}

  .focus-marker{left:50%}

  .card{width:min(68vw,270px);height:42vh;max-height:420px;margin-left:-20vw;box-shadow:none;transition:opacity .12s linear;contain:layout paint;will-change:transform,opacity}

<script>
const viewport = document.getElementById('viewport');
const gallery = document.getElementById('gallery');
let cards = [...document.querySelectorAll('.card')];
const projectTitles = ['LUMINOUS FIELD<br>INSTALLATION STUDY,<br>©2026 STUDIO', 'SIGNAL IN MOTION<br>LIGHT AND SPACE,<br>©2026 STUDIO', 'MECHANICAL DREAM<br>ROBOTIC INSTALLATION,<br>©2026 STUDIO', 'FLOATING ARCHIVE<br>INTERACTIVE MEDIA,<br>©2026 STUDIO', 'DRAWING THE AIR<br>PUBLIC ART PROJECT,<br>©2026 STUDIO', 'NEON MEMORY<br>SPATIAL EXPERIMENT,<br>©2026 STUDIO', 'FRAGILE SYSTEM<br>MATERIAL RESEARCH,<br>©2026 STUDIO', 'AFTER THE SIGNAL<br>MEDIA INSTALLATION,<br>©2026 STUDIO'];
const cardTitleMap = new Map(cards.map((card, i) => [card, projectTitles[i]]));
const projectInfo = document.getElementById('projectInfo');
const projectNumber = document.getElementById('projectNumber');
const projectTitle = document.getElementById('projectTitle');
let activeIndex = -1;
let offset = 0;
let dragging = false;
let startX = 0;
let startOffset = 0;
let velocity = 0;
let lastX = 0;
let lastMoveTime = 0;
let raf = null;
let dragFrame = null;
let cardCenters = new Map();

function focusX(){ return window.innerWidth * .5; }
function rebuildCardCenters(){
  cardCenters = new Map(cards.map(card => [card, card.offsetLeft + card.offsetWidth / 2]));
}
function cardCenterX(card){
  return (cardCenters.get(card) ?? (card.offsetLeft + card.offsetWidth / 2)) + offset;
}

function bounds(){
  const first = cards[0];
  const last = cards[cards.length - 1];
  const firstCenter = first.offsetLeft + first.offsetWidth / 2;
  const lastCenter = last.offsetLeft + last.offsetWidth / 2;
  return {
    max: focusX() - firstCenter,
    min: focusX() - lastCenter
  };
}

function clamp(){
  const b = bounds();
  offset = Math.max(b.min, Math.min(b.max, offset));
}

function render(){
  gallery.style.transform = `translate3d(${offset}px,-50%,0)`;
  updateActive();
}

function updateActive(){
  const target = focusX();
  let nearest = cards[0], dist = Infinity, nextIndex = 0;
  const positions = cards.map(card => ({card,center:cardCenterX(card)}));

  positions.forEach(({card,center}, index) => {
    const delta = center - target;
    const d = Math.abs(delta);

    if (d < dist) {
      dist = d;
      nearest = card;
      nextIndex = index;
    }

    const normalized = Math.max(-2.8, Math.min(2.8, delta / 235));
    const absN = Math.abs(normalized);
    const direction = normalized < 0 ? 1 : -1;

    const rotateY = direction * Math.min(72, absN * 47);
    const translateZ = -Math.min(360, absN * 120);
    const translateX = normalized * 15;
    const scale = Math.max(.78, 1 - absN * .075);

    card.style.transform =
      `translate3d(${translateX}px,0,${translateZ}px) rotateY(${rotateY}deg) scale(${scale})`;
    card.style.zIndex = String(100 - Math.round(absN * 15));
    card.style.opacity = String(Math.max(.22, 1 - absN * .22));
  });

  cards.forEach(c => c.classList.toggle('active', c === nearest));

  if (nextIndex !== activeIndex) {
    activeIndex = nextIndex;
    projectInfo.classList.add('changing');
    window.clearTimeout(updateActive.textTimer);
    updateActive.textTimer = window.setTimeout(() => {
      projectNumber.textContent = `(${String(activeIndex + 1).padStart(2,'0')})`;
    projectTitle.innerHTML = cardTitleMap.get(nearest) || projectTitles[activeIndex];
      projectInfo.classList.remove('changing');
    }, 150);
  }
}

function animateInertia(){
  cancelAnimationFrame(raf);
  const tick = () => {
    if(dragging) return;
    if(Math.abs(velocity) < .2) return snapToActive();
    offset += velocity;
    const rawOffset = offset;
    velocity *= .92;
    clamp();
    if(offset !== rawOffset) velocity = 0;
    render();
    raf = requestAnimationFrame(tick);
  };
  tick();
}

function snapToActive(){
  updateActive();
  const active = document.querySelector('.card.active');
  if(!active) return;
  const delta = focusX() - cardCenterX(active);
  const start = offset;
  const end = offset + delta;
  const duration = 360;
  const t0 = performance.now();
  function step(now){
    const p = Math.min(1,(now-t0)/duration);
    const ease = 1-Math.pow(1-p,3);
    offset = start + (end-start)*ease;
    clamp();
    render();
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  velocity += (-e.deltaY - e.deltaX) * .18;
  animateInertia();
}, {passive:false});

viewport.addEventListener('pointerdown', e => {
  cancelAnimationFrame(raf);
  raf = null;
  if(dragFrame){ cancelAnimationFrame(dragFrame); dragFrame = null; }
  dragging = true;
  startX = lastX = e.clientX;
  lastMoveTime = e.timeStamp;
  startOffset = offset;
  velocity = 0;
  viewport.setPointerCapture(e.pointerId);
});

viewport.addEventListener('pointermove', e => {
  if(!dragging) return;
  const samples = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  const point = samples[samples.length - 1] || e;
  const dx = point.clientX - startX;
  const elapsed = Math.max(1, point.timeStamp - lastMoveTime);
  velocity = (point.clientX - lastX) / elapsed * 16.67;
  lastX = point.clientX;
  lastMoveTime = point.timeStamp;
  offset = startOffset + dx;
  clamp();
  if(!dragFrame){
    dragFrame = requestAnimationFrame(() => {
      dragFrame = null;
      render();
    });
  }
});

viewport.addEventListener('pointerup', e => {
  dragging = false;
  try{viewport.releasePointerCapture(e.pointerId)}catch(_e){}
  if(dragFrame){
    cancelAnimationFrame(dragFrame);
    dragFrame = null;
    render();
  }
  animateInertia();
});

cards.forEach(card => card.addEventListener('click', () => {
  offset += focusX() - cardCenterX(card);
  clamp();
  render();
  snapToActive();
}));

window.addEventListener('resize', () => { rebuildCardCenters(); clamp(); render(); });
setTimeout(() => { 
  rebuildCardCenters();
  const active = document.querySelector('.card.active');
  offset += focusX() - cardCenterX(active);
  render();
}, 80);

/* Mobile menu */
const mobileMenuButton=document.getElementById('mobileMenuButton');
const mobileMenuPanel=document.getElementById('mobileMenuPanel');
mobileMenuButton.addEventListener('click',()=>{
  const open=mobileMenuButton.classList.toggle('open');
  mobileMenuPanel.classList.toggle('open',open);
  mobileMenuButton.setAttribute('aria-expanded',String(open));
  mobileMenuPanel.setAttribute('aria-hidden',String(!open));
});

/* AI panel */
const exploreButton=document.getElementById('exploreButton');
const aiPanel=document.getElementById('aiPanel');
document.getElementById('closePanel').onclick=()=>{aiPanel.classList.remove('open');exploreButton.style.display='flex'};
exploreButton.onclick=()=>{aiPanel.classList.add('open');exploreButton.style.display='none'};
const aiContent=document.getElementById('aiContent');
const aiInput=document.getElementById('aiInput');
function addMessage(text,user=false){
  const d=document.createElement('div'); d.className='message'+(user?' user':''); d.innerText=text;
  aiContent.appendChild(d); aiContent.scrollTop=aiContent.scrollHeight;
}
document.querySelectorAll('.quick-option').forEach(q=>q.onclick=()=>{
  addMessage(q.innerText,true);
  setTimeout(()=>addMessage('我會承接目前的搜尋結果，依照這個方向繼續分析與推薦內容。'),450);
});
function submit(){
  const t=aiInput.value.trim(); if(!t)return;
  addMessage(t,true); aiInput.value='';
  setTimeout(()=>addMessage('我會承接目前的搜尋結果，從你提出的方向重新分析作品之間的關聯。'),450);
}
document.getElementById('sendButton').onclick=submit;
aiInput.onkeydown=e=>{if(e.key==='Enter')submit()};
</script>




<script>
(function(){
  const buttons = [...document.querySelectorAll('.project-categories button')];
  if(!buttons.length || !gallery) return;

  const originalOrder = [...cards];
  const orders = new Map();

  function shuffleCopy(source){
    const arr = [...source];
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  orders.set('All', originalOrder);
  buttons.forEach(button => {
    const key = button.textContent.trim();
    if(key !== 'All') orders.set(key, shuffleCopy(originalOrder));
  });

  function showCategory(key){
    const order = [...(orders.get(key) || originalOrder)];

    // Update both DOM order and the coverflow's internal card order.
    order.forEach(card => gallery.appendChild(card));
    cards = order;

    // Stop any ongoing inertia / drag state.
    cancelAnimationFrame(raf);
    velocity = 0;
    dragging = false;
    activeIndex = -1;

    // Set the first card to its full active width before calculating center.
    const first = cards[0];
    cards.forEach((card, i) => card.classList.toggle('active', i === 0));
    void first.offsetWidth;
    rebuildCardCenters();

    // Put the first card at the focus point, then re-measure after its 3D state settles.
    offset = bounds().max;
    gallery.style.transform = `translate3d(${offset}px,-50%,0)`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      cards.forEach((card, i) => card.classList.toggle('active', i === 0));
      offset += focusX() - cardCenterX(first);
      gallery.style.transform = `translate3d(${offset}px,-50%,0)`;
      updateActive();
    }));

    // Force first artwork info immediately.
    activeIndex = 0;
    projectNumber.textContent = '(01)';
    projectTitle.innerHTML = cardTitleMap.get(first) || projectTitles[0];
    projectInfo.classList.remove('changing');
  }

  buttons.forEach(button => {
    button.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      button.classList.add('active');
      showCategory(button.textContent.trim());
    });
  });
})();
</script>
