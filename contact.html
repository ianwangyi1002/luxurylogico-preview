<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050505"><title>豪華朗機工｜Contact</title><style>
  :root{--bg:#050505;--fg:#f2f2f2;--muted:rgba(255,255,255,.46);--line:rgba(255,255,255,.16);--ease:cubic-bezier(.22,.61,.36,1)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Noto Sans TC",sans-serif;font-weight:300}button,input,textarea{font:inherit;color:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.header{position:fixed;z-index:20;inset:0 0 auto;height:88px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:38px 56px 0 60px;background:linear-gradient(#050505 40%,rgba(5,5,5,.78) 72%,transparent)}.brand{width:98px}.brand img{display:block;width:100%}.nav{display:flex;align-items:center;gap:38px;font-size:12px}.nav img{width:47px;height:33px;object-fit:contain}.lang{justify-self:end;font-size:10px;color:var(--muted)}.menu{display:none}main{padding:170px clamp(30px,7vw,120px) 110px}.hero{display:grid;grid-template-columns:1fr 1fr;gap:9vw;align-items:end;padding-bottom:48px;border-bottom:1px solid var(--line)}.eyebrow{font-size:10px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}.hero h1{font-size:clamp(54px,8vw,126px);line-height:.9;font-weight:280;letter-spacing:-.06em;margin:16px 0 0}.hero p{font-size:13px;line-height:2;color:rgba(255,255,255,.62);margin:0;max-width:620px}.tabs{display:flex;gap:7px;margin:42px 0 64px}.tab,.subtab{border:1px solid var(--line);border-radius:999px;background:transparent;padding:8px 16px;font-size:10px;color:var(--muted);transition:.25s}.tab:hover,.tab.active,.subtab:hover,.subtab.active{color:#fff;border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.05)}.panel{display:none;grid-template-columns:.7fr 1.3fr;gap:clamp(55px,9vw,150px);animation:in .42s var(--ease)}.panel.active{display:grid}@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.panel-copy h2{font-size:clamp(30px,4vw,58px);font-weight:300;letter-spacing:-.04em;margin:20px 0 34px}.subtabs{display:flex;gap:7px;margin-bottom:28px}.panel-copy p{font-size:12px;line-height:2;color:var(--muted);max-width:520px}.form{border-top:1px solid var(--line)}.field{display:grid;grid-template-columns:170px 1fr;gap:30px;padding:19px 0;border-bottom:1px solid var(--line);align-items:start}.field label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}.field input,.field textarea{width:100%;border:0;outline:0;background:transparent;font-size:15px;padding:0;resize:vertical}.field textarea{min-height:86px;line-height:1.7}.submit{margin-top:30px;float:right;border:1px solid rgba(255,255,255,.38);border-radius:999px;background:transparent;padding:12px 24px;font-size:11px}.submit:hover{background:#fff;color:#050505}.status{height:20px;margin-top:42px;font-size:10px;color:var(--muted)}
  @media(max-width:720px){.header{height:76px;padding:52px 16px 0 19px;background:#050505}.brand{width:67px}.nav a{display:none}.nav img{width:24px;height:17px}.lang{display:none}.menu{display:flex;justify-self:end;width:14px;height:7px;flex-direction:column;justify-content:space-between}.menu i{height:1px;background:#fff;width:100%}main{padding:122px 20px 76px}.hero{grid-template-columns:1fr;gap:38px}.hero h1{font-size:58px}.tabs{margin:30px 0 50px}.panel.active{display:block}.panel-copy{margin-bottom:52px}.field{grid-template-columns:1fr;gap:10px}.submit{width:100%;float:none}}
  </style><link rel="stylesheet" href="light-theme.css"><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script></head><body>
  <header class="header"><a class="brand" href="index.html"><img src="embedded-7d630d246b0b.png" alt="豪華朗機工 LuxuryLogico"></a><nav class="nav"><a href="left.html">Works</a><img src="embedded-cacb32ca5c6c.png" alt="天氣鳥"><a href="organization.html">About</a></nav><div class="lang">中 / EN</div><button class="menu" aria-label="選單"><i></i><i></i></button></header>
  <main><section class="hero"><div><div class="eyebrow">Contact / 01</div><h1>一起創作<br>與工作</h1></div><p>無論是藝術合作、公共計畫、展覽製作，或希望加入豪華朗機工，請選擇適合的類型並留下基本資訊，我們會由相應的團隊成員與你聯繫。</p></section><nav class="tabs"><button class="tab active" data-panel="find-us">找我們</button><button class="tab" data-panel="join-us">我們找</button></nav>
    <section class="panel active" id="find-us"><div class="panel-copy"><div class="eyebrow">Collaborate</div><h2>藝術與公關合作</h2><div class="subtabs"><button class="subtab active">藝術合作</button><button class="subtab">公關合作</button></div><p>歡迎藝術機構、策展團隊、品牌與公共單位提出合作邀請。請簡述計畫內容、預計時間與場域，我們將依專案方向進一步聯繫。</p></div><form class="form"><div class="field"><label>姓名 / 單位</label><input required placeholder="您的姓名或單位名稱"></div><div class="field"><label>Email</label><input required type="email" placeholder="name@example.com"></div><div class="field"><label>合作類型</label><input placeholder="藝術、展演、公共藝術、品牌合作…"></div><div class="field"><label>計畫說明</label><textarea placeholder="簡要說明合作內容與預計時程"></textarea></div><button class="submit">送出合作邀請 ↗</button><div class="status"></div></form></section>
    <section class="panel" id="join-us"><div class="panel-copy"><div class="eyebrow">Join the team</div><h2>正式與實習招募</h2><div class="subtabs"><button class="subtab active">正式招募</button><button class="subtab">實習招募</button></div><p>我們尋找願意跨領域協作、重視細節並能共同解決現場問題的夥伴。請提供履歷、作品集連結及希望參與的職位方向。</p></div><form class="form"><div class="field"><label>姓名</label><input required placeholder="您的姓名"></div><div class="field"><label>Email</label><input required type="email" placeholder="name@example.com"></div><div class="field"><label>申請職位</label><input placeholder="設計、製作、專案、技術…"></div><div class="field"><label>履歷連結</label><input type="url" placeholder="https://"></div><div class="field"><label>作品集連結</label><input type="url" placeholder="https://"></div><button class="submit">送出應徵資料 ↗</button><div class="status"></div></form></section>
  </main><script>document.querySelector('.tabs').onclick=e=>{if(!e.target.matches('.tab'))return;document.querySelectorAll('.tab,.panel').forEach(n=>n.classList.remove('active'));e.target.classList.add('active');document.getElementById(e.target.dataset.panel).classList.add('active')};document.querySelectorAll('.subtabs').forEach(x=>x.onclick=e=>{if(!e.target.matches('.subtab'))return;x.querySelectorAll('.subtab').forEach(n=>n.classList.remove('active'));e.target.classList.add('active')});document.querySelectorAll('form').forEach(f=>f.onsubmit=e=>{e.preventDefault();f.querySelector('.status').textContent='已收到資料，此頁為互動示意，不會實際送出。'});if(new URLSearchParams(location.search).get('demo')==='join'){document.querySelectorAll('.tab,.panel').forEach(n=>n.classList.remove('active'));document.querySelector('[data-panel="join-us"]').classList.add('active');document.getElementById('join-us').classList.add('active')}</script></body></html>
